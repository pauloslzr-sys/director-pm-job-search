```yaml
name: PM Job Matcher - Automated Scoring

on:
  workflow_dispatch:
  schedule:
    # Run daily at 5 AM EST (10 AM UTC)
    - cron: '0 10 * * *'

jobs:
  score_jobs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread google-auth-oauthlib google-auth-httplib2 google-auth
      
      - name: Run automated job matcher
        env:
          GOOGLE_OAUTH_TOKEN: ${{ secrets.GOOGLE_OAUTH_TOKEN }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          python job_matcher.py
```
