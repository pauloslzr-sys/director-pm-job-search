name: Director PM Job Search Automation

on:
  schedule:
    # Run at 5 AM EST (10 AM UTC) on Monday, Wednesday, Friday
    - cron: '0 10 * * 1,3,5'
  workflow_dispatch:  # Allow manual trigger

jobs:
  job_search:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 gspread google-auth-oauthlib google-auth-httplib2 google-auth feedparser

      - name: Run job scraper
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}
        run: |
          python job_scraper.py



      - name: Send email notification
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.EMAIL_SERVER }}
          server_port: ${{ secrets.EMAIL_PORT }}
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: 'Job Search Results - ${{ github.run_number }}'
          to: pauloslzr@gmail.com
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
            Job search automation completed successfully.
            
            Check your Google Sheet for new results:
            https://docs.google.com/spreadsheets/d/${{ secrets.GOOGLE_SHEET_ID }}
            
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
