name: Director PM Job Search Automation

on:
  schedule:
    # Run at 5 AM EST (10 AM UTC) on Monday, Wednesday, Friday
    - cron: '0 10 * * 1,3,5'
  workflow_dispatch:

jobs:
  job_search:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 gspread google-auth-oauthlib google-auth-httplib2 google-auth feedparser

      - name: Run job scraper
        env:
          GOOGLE_OAUTH_TOKEN: ${{ secrets.GOOGLE_OAUTH_TOKEN }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: |
          python job_scraper.py
